services:
  mysql:
    image: mysql:8.0
    container_name: nodejs_mysql
    environment:
      MYSQL_DATABASE: nodeapp_db
      MYSQL_USER: developer
      MYSQL_PASSWORD: dev_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  nodejs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nodejs_app
    environment:
      NODE_ENV: development
      DB_HOST: mysql
      DB_USER: developer
      DB_PASSWORD: dev_password
      DB_NAME: nodeapp_db
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - app-network
    restart: unless-stopped

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge
