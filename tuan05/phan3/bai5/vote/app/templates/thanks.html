<!DOCTYPE html>
<html>
<head>
    <title>Vote Received</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 400px; }
        h1 { color: #667eea; margin-bottom: 20px; }
        p { color: #666; margin-bottom: 20px; font-size: 18px; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✅ Thank You!</h1>
        <p>Your vote for <strong>{{ vote | upper }}</strong> has been recorded.</p>
        <p><a href="/">Back to vote again?</a></p>
    </div>
</body>
</html>
