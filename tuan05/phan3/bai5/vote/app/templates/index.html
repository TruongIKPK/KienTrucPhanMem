<!DOCTYPE html>
<html>
<head>
    <title>Voting App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; max-width: 400px; width: 100%; }
        h1 { color: #333; margin-bottom: 30px; font-size: 28px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        label { display: flex; align-items: center; padding: 15px; background: #f5f5f5; border-radius: 5px; cursor: pointer; transition: all 0.3s; }
        label:hover { background: #e0e0e0; }
        input[type="radio"] { margin-right: 10px; width: 20px; height: 20px; cursor: pointer; }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #764ba2; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗳️ Vote Your Favorite</h1>
        <form method="POST" action="/vote">
            {% for option in options %}
            <label>
                <input type="radio" name="vote" value="{{ option }}" required>
                <span>{{ option | upper }}</span>
            </label>
            {% endfor %}
            <button type="submit">Cast Vote</button>
        </form>
    </div>
</body>
</html>
