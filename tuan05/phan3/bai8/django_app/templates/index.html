<!DOCTYPE html>
<html>
<head>
    <title>Django + Celery Task Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .content { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .card h2 { color: #333; margin-bottom: 20px; border-bottom: 2px solid #667eea; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        label { color: #555; font-weight: 600; margin-bottom: 5px; }
        input, select, textarea { padding: 10px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; box-shadow: 0 0 5px rgba(102, 126, 234, 0.3); }
        button { padding: 12px 20px; background: #667eea; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        button:hover { background: #764ba2; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .tasks-list { margin-top: 20px; }
        .task-item { padding: 15px; background: #f5f5f5; border-left: 4px solid #667eea; border-radius: 5px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .task-info { flex: 1; }
        .task-name { font-weight: 600; color: #333; }
        .task-status { font-size: 12px; color: #999; margin-top: 5px; }
        .status { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .status.success { background: #d4edda; color: #155724; }
        .status.pending { background: #fff3cd; color: #856404; }
        .status.failure { background: #f8d7da; color: #721c24; }
        .status.progress { background: #d1ecf1; color: #0c5460; }
        .section { margin-top: 40px; }
        @media (max-width: 768px) {
            .content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Django + Celery Task Manager</h1>
            <p>Submit async tasks and monitor their progress</p>
        </div>
        
        <div class="content">
            <!-- Task Submission -->
            <div class="card">
                <h2>📝 Submit Task</h2>
                <form id="taskForm">
                    <div class="form-group">
                        <label for="taskType">Task Type</label>
                        <select id="taskType" name="task_type" onchange="updateTaskFields()">
                            <option value="long_running">Long Running Task</option>
                            <option value="add">Add Numbers</option>
                            <option value="email">Send Email</option>
                            <option value="process">Process Data</option>
                        </select>
                    </div>
                    
                    <div id="longRunningFields">
                        <div class="form-group">
                            <label for="duration">Duration (seconds)</label>
                            <input type="number" id="duration" name="duration" value="10" min="1" max="60">
                        </div>
                    </div>
                    
                    <div id="addFields" style="display:none;">
                        <div class="form-group">
                            <label for="x">First Number</label>
                            <input type="number" id="x" name="x" value="5">
                        </div>
                        <div class="form-group">
                            <label for="y">Second Number</label>
                            <input type="number" id="y" name="y" value="3">
                        </div>
                    </div>
                    
                    <div id="emailFields" style="display:none;">
                        <div class="form-group">
                            <label for="recipient">Recipient</label>
                            <input type="email" id="recipient" name="recipient" value="test@example.com">
                        </div>
                        <div class="form-group">
                            <label for="subject">Subject</label>
                            <input type="text" id="subject" name="subject" value="Test Subject">
                        </div>
                        <div class="form-group">
                            <label for="message">Message</label>
                            <textarea id="message" name="message" rows="3">Test message content</textarea>
                        </div>
                    </div>
                    
                    <div id="processFields" style="display:none;">
                        <div class="form-group">
                            <label for="data">Data Size</label>
                            <input type="number" id="data" name="data" value="100" min="10" max="10000">
                        </div>
                    </div>
                    
                    <button type="submit">Submit Task</button>
                </form>
                
                <div id="submitResult" style="margin-top: 20px; display: none;">
                    <div style="padding: 15px; background: #d4edda; border-radius: 5px; color: #155724;">
                        <strong>Task Submitted!</strong>
                        <p id="taskId" style="margin-top: 10px;"></p>
                    </div>
                </div>
            </div>
            
            <!-- Task Monitor -->
            <div class="card">
                <h2>📊 Monitor Task</h2>
                <div class="form-group">
                    <label for="monitorTaskId">Task ID</label>
                    <input type="text" id="monitorTaskId" placeholder="Enter task ID">
                </div>
                <button onclick="monitorTask()">Check Status</button>
                
                <div id="taskStatus" style="margin-top: 20px; display: none;">
                    <div style="padding: 15px; background: #f5f5f5; border-radius: 5px;">
                        <p><strong>Status:</strong> <span id="statusValue" class="status"></span></p>
                        <p id="resultValue" style="margin-top: 10px;"></p>
                        <p id="progressValue" style="margin-top: 10px; color: #666;"></p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Recent Tasks -->
        <div class="card section">
            <h2>📋 Recent Tasks</h2>
            <div id="tasksList" class="tasks-list">
                <p style="color: #999;">No tasks yet. Submit one to get started!</p>
            </div>
            <button onclick="loadTasks()" style="margin-top: 15px;">Refresh Tasks</button>
        </div>
    </div>
    
    <script>
        function updateTaskFields() {
            const taskType = document.getElementById('taskType').value;
            document.getElementById('longRunningFields').style.display = taskType === 'long_running' ? 'block' : 'none';
            document.getElementById('addFields').style.display = taskType === 'add' ? 'block' : 'none';
            document.getElementById('emailFields').style.display = taskType === 'email' ? 'block' : 'none';
            document.getElementById('processFields').style.display = taskType === 'process' ? 'block' : 'none';
        }
        
        document.getElementById('taskForm').onsubmit = function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            
            fetch('/api/task/submit/', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.task_id) {
                    document.getElementById('taskId').textContent = '✓ Task ID: ' + data.task_id;
                    document.getElementById('submitResult').style.display = 'block';
                    document.getElementById('monitorTaskId').value = data.task_id;
                    
                    setTimeout(loadTasks, 1000);
                }
            })
            .catch(err => alert('Error: ' + err));
        };
        
        function monitorTask() {
            const taskId = document.getElementById('monitorTaskId').value;
            if (!taskId) {
                alert('Please enter a task ID');
                return;
            }
            
            fetch('/api/task/' + taskId + '/')
                .then(r => r.json())
                .then(data => {
                    const statusEl = document.getElementById('statusValue');
                    statusEl.textContent = data.status;
                    statusEl.className = 'status ' + data.status.toLowerCase();
                    
                    if (data.result) {
                        document.getElementById('resultValue').innerHTML = '<strong>Result:</strong> ' + JSON.stringify(data.result);
                    }
                    
                    document.getElementById('taskStatus').style.display = 'block';
                })
                .catch(err => alert('Error: ' + err));
        }
        
        function loadTasks() {
            fetch('/api/tasks/')
                .then(r => r.text())
                .then(html => {
                    document.getElementById('tasksList').innerHTML = html;
                })
                .catch(err => console.error(err));
        }
        
        // Auto-load tasks on page load
        window.onload = () => {
            loadTasks();
            setInterval(loadTasks, 5000);
        };
    </script>
</body>
</html>
