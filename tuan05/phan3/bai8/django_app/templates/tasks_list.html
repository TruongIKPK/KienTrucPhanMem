{% for task in tasks %}
<div class="task-item">
    <div class="task-info">
        <div class="task-name">{{ task.task_name }}</div>
        <div class="task-status">
            ID: {{ task.task_id }}<br>
            Created: {{ task.created_at|date:"Y-m-d H:i:s" }}
        </div>
    </div>
    <div class="status {{ task.status|lower }}">{{ task.status }}</div>
</div>
{% empty %}
<p style="color: #999;">No tasks found</p>
{% endfor %}
