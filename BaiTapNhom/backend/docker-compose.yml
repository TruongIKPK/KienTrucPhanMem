services:
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  food-service:
    build:
      context: ./food-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
    networks:
      - food-ordering-network
    depends_on:
      user-service:
        condition: service_healthy
      food-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    expose:
      - "8084"
    environment:
      - ORDER_SERVICE_URL=http://order-service:8083
    networks:
      - food-ordering-network
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    expose:
      - "8080"
    environment:
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
      - ORDER_SERVICE_URL=http://order-service:8083
      - PAYMENT_SERVICE_URL=http://payment-service:8084
    networks:
      - food-ordering-network
    depends_on:
      user-service:
        condition: service_healthy
      food-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  gateway-lb:
    image: nginx:alpine
    ports:
      - "8080:8080"
    volumes:
      - ./gateway-lb.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - food-ordering-network
    depends_on:
      api-gateway:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    networks:
      - food-ordering-network
    depends_on:
      gateway-lb:
        condition: service_started

networks:
  food-ordering-network:
    driver: bridge
