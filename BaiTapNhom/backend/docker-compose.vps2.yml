services:
  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL}
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  food-service:
    build:
      context: ./food-service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    environment:
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL}
    networks:
      - food-ordering-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    environment:
      - EUREKA_SERVER_URL=${EUREKA_SERVER_URL}
      - USER_SERVICE_URL=http://user-service:8081
      - FOOD_SERVICE_URL=http://food-service:8082
    networks:
      - food-ordering-network
    depends_on:
      user-service:
        condition: service_healthy
      food-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      - EUREKA_SERVER_URL=http://192.168.1.10:8761/eureka
      - ORDER_SERVICE_URL=http://order-service:8083
    networks:
      - food-ordering-network
    depends_on:
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  food-ordering-network:
    driver: bridge

